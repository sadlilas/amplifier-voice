<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplifier Voice</title>
<script src="static/vendor.js"></script>
<script src="static/connection-health.mjs"></script>
<script src="static/theme-init.js"></script>
<script src="static/feedback-widget.js"></script>

<link rel="stylesheet" href="static/amplifier-theme.css">
<link rel="icon" href="static/favicon.svg" type="image/svg+xml">
<style>
/* ------------------------------------------------------------------ */
/*  Voice app body - centered single-task layout                       */
/* ------------------------------------------------------------------ */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
  min-height: 100vh;
}

/* ------------------------------------------------------------------ */
/*  App container                                                       */
/* ------------------------------------------------------------------ */
#app {
  width: 100%;
  max-width: 900px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: fadeIn var(--duration-normal) var(--ease-out);
}

/* ------------------------------------------------------------------ */
/*  Header                                                             */
/* ------------------------------------------------------------------ */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid var(--canvas-mist);
}

.app-title {
  font-family: var(--font-heading);
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: var(--signal);
  letter-spacing: 0.05em;
}

/* ------------------------------------------------------------------ */
/*  Status badge                                                       */
/* ------------------------------------------------------------------ */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: var(--radius-card);
  font-size: 13px;
  font-weight: 600;
  border: 1px solid transparent;
}

.status-badge.idle {
  background: var(--canvas-mist);
  color: var(--ink-fog);
  border-color: var(--canvas-mist);
}

.status-badge.connecting {
  background: var(--warning-soft);
  color: var(--warning);
  border-color: var(--warning);
}

.status-badge.connected {
  background: var(--success-soft);
  color: var(--success);
  border-color: var(--success);
}

.status-badge.disconnected {
  background: var(--error-soft);
  color: var(--error);
  border-color: var(--error);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}

.status-badge.connecting .status-dot {
  animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ------------------------------------------------------------------ */
/*  Error banner                                                       */
/* ------------------------------------------------------------------ */
.error-banner {
  background: var(--error-soft);
  border: 1px solid var(--error);
  border-radius: var(--radius-input);
  padding: 12px 16px;
  color: var(--error);
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ------------------------------------------------------------------ */
/*  Transcript                                                         */
/* ------------------------------------------------------------------ */
.transcript-container {
  flex: 1;
  min-height: 300px;
  max-height: 500px;
  overflow-y: auto;
  background: var(--canvas-warm);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-input);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.transcript-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-disabled, var(--ink-fog));
  font-size: 14px;
  font-style: italic;
}

.message-bubble {
  display: flex;
  flex-direction: column;
  max-width: 72%;
}

.message-bubble.user {
  align-self: flex-end;
  align-items: flex-end;
}

.message-bubble.assistant {
  align-self: flex-start;
  align-items: flex-start;
}

.bubble-label {
  font-size: 11px;
  color: var(--ink-fog);
  margin-bottom: 4px;
  text-transform: capitalize;
}

.bubble-text {
  padding: 10px 14px;
  border-radius: var(--radius-button);
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
}

.message-bubble.user .bubble-text {
  background: var(--signal-light);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.message-bubble.assistant .bubble-text {
  background: var(--canvas-stone);
  color: var(--ink);
  border: 1px solid var(--canvas-mist);
  border-bottom-left-radius: 4px;
}

/* History messages from a prior session are dimmed and italicised */
.message-bubble.history .bubble-text {
  opacity: 0.55;
  font-style: italic;
}

/* Divider between injected history and the live session */
.history-divider {
  text-align: center;
  color: var(--text-disabled, var(--ink-fog));
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  padding: 6px 0;
  margin: 4px 0;
  border-top: 1px solid var(--canvas-mist);
}

/* ------------------------------------------------------------------ */
/*  Controls                                                           */
/* ------------------------------------------------------------------ */
.controls {
  display: flex;
  gap: 12px;
}

.btn {
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-input);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out);
  flex: 1;
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-start {
  background: var(--signal);
  color: #fff;
}

.btn-start:hover:not(:disabled) {
  background: var(--signal-light);
}

.btn-disconnect {
  background: var(--error);
  color: #fff;
}

.btn-disconnect:hover:not(:disabled) {
  background: var(--error);
  filter: brightness(0.9);
}

/* ------------------------------------------------------------------ */
/*  Pause-replies banner / muted badge  (Task 5.4)                    */
/* ------------------------------------------------------------------ */
.pause-banner {
  background: var(--warning-soft);
  border: 1px solid var(--warning);
  border-radius: var(--radius-input);
  padding: 10px 16px;
  color: var(--warning);
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.muted-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--radius-button);
  font-size: 12px;
  font-weight: 600;
  background: var(--error-soft);
  color: var(--error);
  border: 1px solid var(--error);
}

/* ------------------------------------------------------------------ */
/*  Delegation Overlay  (delegation-feedback)                         */
/* ------------------------------------------------------------------ */
.delegation-overlay {
  background: var(--canvas-stone);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-input);
  padding: 12px 16px;
  color: var(--signal);
  font-size: 13px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  animation: fadeInOverlay var(--duration-fast) var(--ease-out);
}
@keyframes fadeInOverlay {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.delegation-overlay-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
}
.delegation-overlay-spinner {
  display: inline-block;
  width: 10px;
  height: 10px;
  border: 2px solid var(--signal);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.delegation-overlay-tools {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 80px;
  overflow-y: auto;
  padding-left: 18px;
}
.delegation-overlay-tool {
  color: var(--signal-light);
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.delegation-overlay-tool::before {
  content: '→ ';
  color: var(--signal);
}
/* ------------------------------------------------------------------ */
/*  Delegation Transcript Entry  (delegation-feedback)                */
/* ------------------------------------------------------------------ */
.message-bubble.delegation {
  align-self: stretch;
  max-width: 100%;
  align-items: flex-start;
}
.message-bubble.delegation .bubble-label {
  color: var(--signal);
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.message-bubble.delegation .bubble-text {
  background: var(--canvas-stone);
  color: var(--signal-light);
  border: 1px solid var(--canvas-mist);
  border-bottom-left-radius: 4px;
  font-size: 13px;
  width: 100%;
  cursor: pointer;
}
.message-bubble.delegation .bubble-text:hover {
  border-color: var(--signal);
}
.message-bubble.delegation.error .bubble-text {
  background: var(--warning-soft);
  border-color: var(--warning);
  color: var(--warning);
}
.delegation-summary {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.delegation-dots {
  display: inline-flex;
  gap: 3px;
  align-items: center;
}
.delegation-dots span {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--signal);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.delegation-dots span:nth-child(2) { animation-delay: 0.2s; }
.delegation-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40%           { opacity: 1;   transform: scale(1); }
}
.delegation-tool-list {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--canvas-mist);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.delegation-tool-item {
  font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--signal);
}
.delegation-tool-item::before {
  content: '→ ';
  color: var(--signal);
}

/* ------------------------------------------------------------------ */
/*  Connection Health Panel  (Task 5.5)                               */
/* ------------------------------------------------------------------ */
.health-panel {
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-input);
  background: var(--canvas-warm);
  overflow: hidden;
}

.health-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-slate);
  background: var(--canvas);
  border: none;
  width: 100%;
  text-align: left;
}

.health-panel-header:hover {
  background: var(--canvas-stone);
  color: var(--ink);
}

.health-panel-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.health-panel-body {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.health-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--ink-slate);
}

.health-label {
  color: var(--ink-fog);
  width: 130px;
  flex-shrink: 0;
}

.health-value {
  font-variant-numeric: tabular-nums;
  font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
}

.health-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.warning-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-input);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.warning-badge.stale {
  background: var(--warning-soft);
  color: var(--warning);
  border: 1px solid var(--warning);
}

.warning-badge.idle {
  background: var(--signal-soft);
  color: var(--signal);
  border: 1px solid var(--signal);
}

.warning-badge.session_limit {
  background: var(--error-soft);
  color: var(--error);
  border: 1px solid var(--error);
}

.health-strategy {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

.health-strategy label {
  color: var(--ink-fog);
}

.health-strategy select {
  background: var(--canvas-stone);
  color: var(--ink);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-subtle);
  padding: 4px 8px;
  font-size: 13px;
  cursor: pointer;
}

/* ------------------------------------------------------------------ */
/*  Session Picker  (Task 5.6)                                        */
/* ------------------------------------------------------------------ */
.session-picker {
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-input);
  background: var(--canvas-warm);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.session-picker-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-slate);
  margin-bottom: 4px;
}

.session-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--canvas);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-subtle);
  gap: 12px;
}

.session-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}

.session-title {
  font-size: 13px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-status {
  font-size: 11px;
  color: var(--ink-fog);
  text-transform: capitalize;
}

.session-date {
  font-size: 11px;
  color: var(--text-disabled, var(--ink-fog));
}

.btn-resume {
  background: var(--signal);
  color: #fff;
  padding: 6px 14px;
  font-size: 13px;
  flex: none;
}

.btn-resume:hover:not(:disabled) {
  background: var(--signal-dark);
}

/* ------------------------------------------------------------------ */
/*  Stop Button  (Task 5.6)                                           */
/* ------------------------------------------------------------------ */
.btn-stop {
  background: var(--error);
  color: #fff;
}

.btn-stop:hover:not(:disabled) {
  background: var(--error);
  filter: brightness(0.9);
}

.btn-stop.cancelling {
  background: var(--error);
  filter: brightness(0.7);
  cursor: wait;
}

/* ------------------------------------------------------------------ */
/*  Microphone Controls  (Task 5.6)                                   */
/* ------------------------------------------------------------------ */
.mic-controls {
  display: flex;
  gap: 8px;
}

.btn-mic {
  background: var(--canvas-stone);
  color: var(--ink);
  border: 1px solid var(--canvas-mist);
  flex: 1;
}

.btn-mic:hover:not(:disabled) {
  background: var(--canvas-mist);
}

.btn-mic.muted {
  background: var(--error-soft);
  color: var(--error);
  border-color: var(--error);
}

.btn-pause {
  background: var(--canvas-stone);
  color: var(--ink);
  border: 1px solid var(--canvas-mist);
  flex: 1;
}

.btn-pause:hover:not(:disabled) {
  background: var(--canvas-mist);
}

.btn-pause.paused {
  background: var(--warning-soft);
  color: var(--warning);
  border-color: var(--warning);
}

.btn-respond {
  background: var(--signal-soft);
  color: var(--signal);
  border: 1px solid var(--signal);
  flex: 1;
}

.btn-respond:hover:not(:disabled) {
  background: var(--signal);
  color: #fff;
}

/* ------------------------------------------------------------------ */
/*  Secure-context error banner                                       */
/* ------------------------------------------------------------------ */
.secure-context-banner {
  background: var(--canvas-warm);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-input);
  padding: 16px 20px;
  color: var(--ink);
  font-size: 14px;
}
.secure-context-banner h3 {
  font-weight: 700;
  font-size: 15px;
  margin: 0 0 8px 0;
}
.secure-context-banner p {
  color: var(--ink-slate);
  margin: 0 0 12px 0;
}
.secure-context-banner ul {
  margin: 0;
  padding-left: 20px;
  color: var(--ink-slate);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.secure-context-banner code {
  background: var(--canvas-stone);
  padding: 2px 6px;
  border-radius: var(--radius-subtle);
  color: var(--ink);
}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  'use strict';

  // Pull globals from vendor.js
  const { h, render, Fragment } = window.preact;
  const { useState, useEffect, useRef, useCallback } = window.preactHooks;
  const html = window.html;

  // -------------------------------------------------------------------------
  // useWebRTC({ onMessage, onStateChange })
  // -------------------------------------------------------------------------

  function useWebRTC({ onMessage, onStateChange, onIceStateChange }) {
    const [rtcState, setRtcState] = useState('idle');
    const [secureContextError, setSecureContextError] = useState(false);
    const pcRef = useRef(null);
    const dcRef = useRef(null);
    const tokenRef = useRef(null);
    const streamRef = useRef(null);  // holds MediaStream for track cleanup
    const audioRef = useRef(null);   // holds <audio> element for DOM cleanup

    // Helper: update both local state and notify parent
    const updateState = useCallback((state) => {
      setRtcState(state);
      if (onStateChange) onStateChange(state);
    }, [onStateChange]);

    // -----------------------------------------------------------------------
    // connect()
    // -----------------------------------------------------------------------
    const connect = useCallback(async (initialItems = []) => {
      updateState('connecting');
      setSecureContextError(false);

      // Guard: microphone requires a secure context (HTTPS or localhost)
      if (!window.isSecureContext) {
        updateState('disconnected');
        setSecureContextError(true);
        return;
      }

      // Step 1: Fetch ephemeral token from backend
      let token;
      try {
        const resp = await fetch('/voice/session');
        if (!resp.ok) throw new Error(`Session token fetch failed: ${resp.status}`);
        const data = await resp.json();
        token = data.client_secret.value;
      } catch (err) {
        console.error('[useWebRTC] Failed to fetch session token:', err);
        updateState('disconnected');
        throw err;
      }
      tokenRef.current = token;

      // Step 2: Create RTCPeerConnection with STUN
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
      });
      pcRef.current = pc;

      // Step 3: Get user microphone audio and add track
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        console.error('[useWebRTC] getUserMedia failed:', err);
        pc.close();
        updateState('disconnected');
        throw err;
      }
      streamRef.current = stream;  // store so disconnect() can stop tracks
      stream.getTracks().forEach((track) => pc.addTrack(track, stream));

      // Step 4: Play incoming audio tracks from OpenAI
      pc.ontrack = (event) => {
        if (audioRef.current) audioRef.current.remove(); // replace any prior element
        const audio = document.createElement('audio');
        audio.autoplay = true;
        audio.srcObject = event.streams[0] || new MediaStream([event.track]);
        document.body.appendChild(audio);
        audioRef.current = audio;
      };

      // Step 5: Create data channel for OpenAI events
      const dc = pc.createDataChannel('oai-events');
      dcRef.current = dc;

      // Step 6 & 7: On data channel open — two-stage VAD setup
      dc.onopen = () => {
        // Stage 1: server_vad with transcription enabled
        // NOTE: noise_reduction is not a valid GA Realtime API session field; omit it.
        // Tool definitions registered here (not at client_secrets creation time —
        // the client_secrets endpoint only accepts model, voice, and instructions).
        // type:'function' is required by the Realtime API; the flat format without
        // it is rejected.
        const TOOLS = [
          {
            type: 'function',
            name: 'delegate',
            description: 'Delegate a task to the Amplifier agent with the given instruction.',
            parameters: {
              type: 'object',
              properties: {
                instruction: { type: 'string', description: 'The instruction to pass to Amplifier.' },
              },
              required: ['instruction'],
            },
          },
          {
            type: 'function',
            name: 'cancel_current_task',
            description: 'Cancel the currently running Amplifier task.',
            parameters: { type: 'object', properties: {} },
          },
          {
            type: 'function',
            name: 'pause_replies',
            description: 'Pause assistant replies until resume_replies is called.',
            parameters: { type: 'object', properties: {} },
          },
          {
            type: 'function',
            name: 'resume_replies',
            description: 'Resume assistant replies after pause_replies.',
            parameters: { type: 'object', properties: {} },
          },
        ];

        // Configure transcription and VAD using the GA Realtime API nested format.
        // input_audio_transcription / turn_detection at the top-level session object
        // are beta API fields; the GA API uses audio.input.transcription and
        // audio.input.turn_detection.
        const sessionConfig = {
          type: 'session.update',
          session: {
            type: 'realtime',
            audio: {
              input: {
                transcription: { model: 'gpt-4o-transcribe', language: 'en' },
                turn_detection: { type: 'server_vad', threshold: 0.5 },
              },
            },
            tools: TOOLS,
          },
        };
        dc.send(JSON.stringify(sessionConfig));

        // Send retention ratio truncation config.  When the context window
        // fills, the oldest (1 - ratio) portion is dropped in one chunk.
        // This enables long-running sessions without manual truncation.
        const truncationConfig = {
          type: 'session.update',
          session: {
            type: 'realtime',
            truncation: {
              type: 'retention_ratio',
              retention_ratio: 0.8,
            },
          },
        };
        dc.send(JSON.stringify(truncationConfig));

        // Inject resume context items into the Realtime API session (non-empty on
        // resume only). Sent after session.update so config is already in place.
        // A response.create follows so the model can greet the user with context.
        if (initialItems.length > 0) {
          initialItems.forEach((item) => {
            dc.send(JSON.stringify({ type: 'conversation.item.create', item }));
          });
          setTimeout(() => {
            if (dc.readyState === 'open') {
              dc.send(JSON.stringify({ type: 'response.create' }));
            }
          }, 200);
        }
      };

      // Step 8: Forward data channel messages to caller
      dc.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (onMessage) onMessage(msg);
        } catch (err) {
          console.warn('[useWebRTC] Failed to parse data channel message:', err);
        }
      };

      // Step 9: Track ICE connection state changes
      pc.oniceconnectionstatechange = () => {
        const iceState = pc.iceConnectionState;
        console.debug('[useWebRTC] ICE connection state:', iceState);
        if (onIceStateChange) onIceStateChange(iceState);
        if (iceState === 'connected' || iceState === 'completed') {
          updateState('connected');
        } else if (iceState === 'disconnected' || iceState === 'failed' || iceState === 'closed') {
          updateState('disconnected');
        }
      };

      // Step 10: SDP exchange
      // Create offer and set as local description
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to complete (max 2 seconds)
      await new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') {
          resolve();
          return;
        }
        const timer = setTimeout(resolve, 2000);
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') {
            clearTimeout(timer);
            resolve();
          }
        };
      });

      // POST SDP offer to backend, get SDP answer
      let sdpAnswer;
      try {
        const sdpResp = await fetch('/voice/sdp', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/sdp',
            'Authorization': `Bearer ${token}`,
          },
          body: pc.localDescription.sdp,
        });
        if (!sdpResp.ok) throw new Error(`SDP exchange failed: ${sdpResp.status}`);
        // Extract call_id from custom header (identifies the WebRTC call)
        const callId = sdpResp.headers.get('X-Call-Id') || '';
        if (callId) console.debug('[useWebRTC] call_id:', callId);
        sdpAnswer = await sdpResp.text();
      } catch (err) {
        console.error('[useWebRTC] SDP exchange failed:', err);
        pc.close();
        updateState('disconnected');
        throw err;
      }

      // Set remote description with the SDP answer
      await pc.setRemoteDescription({ type: 'answer', sdp: sdpAnswer });
    }, [onMessage, updateState]);

    // -----------------------------------------------------------------------
    // disconnect()
    // -----------------------------------------------------------------------
    const disconnect = useCallback(() => {
      if (dcRef.current) {
        try { dcRef.current.close(); } catch (_) { /* ignore: already closed */ }
        dcRef.current = null;
      }
      if (pcRef.current) {
        try { pcRef.current.close(); } catch (_) { /* ignore: already closed */ }
        pcRef.current = null;
      }
      if (streamRef.current) {
        streamRef.current.getTracks().forEach((t) => t.stop());
        streamRef.current = null;
      }
      if (audioRef.current) {
        audioRef.current.remove();
        audioRef.current = null;
      }
      tokenRef.current = null;
      updateState('idle');
    }, [updateState]);

    // -----------------------------------------------------------------------
    // sendDataChannelMessage(msg)
    // -----------------------------------------------------------------------
    const sendDataChannelMessage = useCallback((msg) => {
      const dc = dcRef.current;
      if (dc && dc.readyState === 'open') {
        dc.send(JSON.stringify(msg));
      } else {
        console.warn('[useWebRTC] Data channel not open, cannot send message');
      }
    }, []);

    return { rtcState, secureContextError, connect, disconnect, sendDataChannelMessage, dcRef, streamRef };
  }

  // -------------------------------------------------------------------------
  // useChatMessages({ sendDataChannelMessage, sessionId })   Task 5.3
  // -------------------------------------------------------------------------

  function useChatMessages({ sendDataChannelMessage, sessionId, checkTranscript, onPauseReplies, onResumeReplies }) {
    const [messages, setMessages] = useState([]);
    const [responseInProgress, setResponseInProgress] = useState(false);

    // Refs — mutations without triggering rerenders
    const pendingAnnouncements = useRef([]);
    const messageRefs = useRef({});
    const currentStreamingId = useRef(null);
    // Accumulates assistant streaming deltas so DOM mutations survive re-renders.
    // When Preact reconciles with msg.content='' it wipes directly-mutated textContent;
    // the accumulator lets us restore the full text on the next delta or on mount.
    const streamingAccumulator = useRef('');
    // Shadow ref so async callbacks always see the current responseInProgress value
    const responseInProgressRef = useRef(false);
    // Tracks the ID of the in-progress user bubble (created on speech_started,
    // filled on transcription.completed).
    const streamingUserBubbleId = useRef(null);
    // Tracks current audio output item for interruption truncation (P1)
    const currentOutputItemId = useRef(null);
    const responseStartTime = useRef(null);

    // Keep state and ref in sync together
    const setRip = useCallback((val) => {
      responseInProgressRef.current = val;
      setResponseInProgress(val);
    }, []);

    // addUserMessage(transcript, itemId): add a user bubble
    const addUserMessage = useCallback((transcript, itemId) => {
      const id = itemId || ('user-' + Date.now());
      setMessages((prev) => [...prev, { id, role: 'user', content: transcript }]);
    }, []);

    // startAssistantMessage(): add an empty assistant bubble, set currentStreamingId
    const startAssistantMessage = useCallback(() => {
      const id = 'asst-' + Date.now();
      currentStreamingId.current = id;
      streamingAccumulator.current = '';
      setMessages((prev) => [...prev, { id, role: 'assistant', content: '' }]);
    }, []);

    // clearMessages(): reset all chat state (called on disconnect)
    const clearMessages = useCallback(() => {
      setMessages([]);
      setRip(false);
      pendingAnnouncements.current = [];
      currentStreamingId.current = null;
      streamingAccumulator.current = '';
      messageRefs.current = {};
      streamingUserBubbleId.current = null;
    }, [setRip]);

    // loadHistoryMessages(contextItems): populate messages from resume context.
    // Only message-type items (user/assistant) are shown; tool call items are
    // injected into the model via the data channel but not displayed here.
    // Messages are marked isHistory:true so the render can dim them and insert
    // a visual divider between the prior session and the live one.
    const loadHistoryMessages = useCallback((contextItems) => {
      const historyMsgs = contextItems
        .filter((item) => item.type === 'message' && (item.role === 'user' || item.role === 'assistant'))
        .map((item, i) => ({
          id: 'history-' + i + '-' + Date.now(),
          role: item.role,
          content: (item.content && item.content[0] && item.content[0].text) || '',
          isHistory: true,
        }));
      if (historyMsgs.length > 0) {
        setMessages(historyMsgs);
      }
    }, []);

    // handleDataChannelEvent(event) async — main OpenAI Realtime event dispatcher
    const handleDataChannelEvent = useCallback(async (event) => {
      const { type } = event;
      console.debug('[useChatMessages] event:', type);

      // Log OpenAI API errors immediately — the most common silent failure is a
      // rejected session.update (wrong model name, invalid tool format, etc.).
      // Without this, session.update failures are dropped and we never know why
      // transcription or tools don't work.
      if (type === 'error') {
        console.error('[VoiceApp] OpenAI Realtime API error:', JSON.stringify(event, null, 2));
        return;
      }

      // Confirm session config was applied (or spot a partial failure)
      if (type === 'session.updated') {
        const s = event.session || {};
        console.log(
          '[VoiceApp] session.updated — transcription:',
          JSON.stringify(s.audio?.input?.transcription),
          '| tools:', (s.tools || []).map((t) => t.name).join(', ') || 'none',
          '| turn_detection:', s.audio?.input?.turn_detection?.type,
        );
        return;
      }

      // User started speaking — create an empty streaming bubble immediately.
      // The bubble will be filled with the transcript when transcription.completed fires.
      if (type === 'input_audio_buffer.speech_started') {
        const id = 'user-' + Date.now();
        streamingUserBubbleId.current = id;
        setMessages((prev) => [...prev, { id, role: 'user', content: '…' }]);
        // Truncate any in-progress audio response so the conversation history
        // matches what the user actually heard, not the full undelivered output.
        if (responseInProgressRef.current && currentOutputItemId.current) {
          sendDataChannelMessage({
            type: 'conversation.item.truncate',
            item_id: currentOutputItemId.current,
            content_index: 0,
            audio_end_ms: responseStartTime.current !== null
              ? Math.max(0, Date.now() - responseStartTime.current)
              : 0,
          });
        }
        return;
      }

      // User finished speaking — fill the streaming bubble with transcript text.
      if (type === 'conversation.item.input_audio_transcription.completed') {
        const transcript = event.transcript || '';
        const bubbleId = streamingUserBubbleId.current;
        if (bubbleId) {
          // Fill the existing streaming bubble created on speech_started.
          setMessages((prev) =>
            prev.map((m) => (m.id === bubbleId ? { ...m, content: transcript } : m))
          );
          streamingUserBubbleId.current = null;
        } else {
          // Fallback: no streaming bubble exists (e.g. speech_started was missed).
          addUserMessage(transcript, event.item_id);
        }
        // Task 5.4: run wake-word detection before auto-respond decision
        if (checkTranscript) checkTranscript(transcript);
        if (!responseInProgressRef.current) {
          sendDataChannelMessage({ type: 'response.create' });
        }
        return;
      }

      // Streaming assistant text — accumulate into the ref AND update React state.
      // Direct DOM mutation is unreliable because Preact reconciliation overwrites
      // textContent whenever msg.content='' is in state. Updating state on each delta
      // keeps Preact's VDOM in sync so reconciliation never blanks the bubble.
      // Bubble is created lazily here (not in response.created) so tool-call-only
      // responses never leave an empty orphan bubble in the UI.
      if (type === 'response.output_audio_transcript.delta') {
        if (!currentStreamingId.current) {
          startAssistantMessage();
        }
        const id = currentStreamingId.current;
        if (id) {
          streamingAccumulator.current += event.delta || '';
          const accumulated = streamingAccumulator.current;
          setMessages((prev) =>
            prev.map((m) => (m.id === id ? { ...m, content: accumulated } : m))
          );
        }
        return;
      }

      // Streaming finished — commit final transcript to state.
      // Use event.transcript if provided; fall back to locally-accumulated value
      // in case the API omits it or the connection was degraded.
      if (type === 'response.output_audio_transcript.done') {
        const id = currentStreamingId.current;
        const finalText = event.transcript || streamingAccumulator.current || '';
        setMessages((prev) =>
          prev.map((m) => (m.id === id ? { ...m, content: finalText } : m))
        );
        currentStreamingId.current = null;
        streamingAccumulator.current = '';
        return;
      }

      // Text-modality response streaming (fires when modality includes "text").
      // Mirrors the audio_transcript path — same lazy bubble creation, same accumulator.
      if (type === 'response.output_text.delta') {
        if (!currentStreamingId.current) {
          startAssistantMessage();
        }
        const id = currentStreamingId.current;
        if (id) {
          streamingAccumulator.current += event.delta || '';
          const accumulated = streamingAccumulator.current;
          setMessages((prev) =>
            prev.map((m) => (m.id === id ? { ...m, content: accumulated } : m))
          );
        }
        return;
      }

      if (type === 'response.output_text.done') {
        const id = currentStreamingId.current;
        // event.text (not event.transcript) is the field for text-modality done events
        const finalText = event.text || streamingAccumulator.current || '';
        setMessages((prev) =>
          prev.map((m) => (m.id === id ? { ...m, content: finalText } : m))
        );
        currentStreamingId.current = null;
        streamingAccumulator.current = '';
        return;
      }

      // Response cycle started — bubble is created lazily on the first
      // audio_transcript.delta or output_text.delta so tool-call-only responses
      // never produce an empty orphan bubble.
      if (type === 'response.created') {
        setRip(true);
        responseStartTime.current = Date.now();
        return;
      }

      // Response cycle completed — flush any queued follow-ups
      if (type === 'response.done') {
        setRip(false);
        const pending = pendingAnnouncements.current.splice(0);
        if (pending.length > 0) {
          sendDataChannelMessage({ type: 'response.create' });
        }
        return;
      }

      // Track the current audio output item so speech_started can truncate it (P1)
      if (type === 'response.output_item.added') {
        const item = event.item;
        if (item && item.type !== 'function_call') {
          currentOutputItemId.current = item.id;
        }
        return;
      }

      // Tool call from the model — act on output_item.done, not output_item.added.
      // output_item.added fires when the item is *created*; arguments stream in
      // afterward and are only guaranteed complete at output_item.done.
      // Executing on .added risks calling the tool with empty or truncated arguments.
      if (type === 'response.output_item.done') {
        const item = event.item;
        if (!item || item.type !== 'function_call') return;

        const toolName = item.name;
        const callId = item.call_id;
        const args = item.arguments || '{}';

        // Browser-side pause/resume tools — handled locally, no server round-trip.
        // Send function_call_output so the model's tool call is correctly closed out.
        if (toolName === 'pause_replies') {
          if (onPauseReplies) onPauseReplies();
          sendDataChannelMessage({
            type: 'conversation.item.create',
            item: { type: 'function_call_output', call_id: callId, output: JSON.stringify({ result: 'paused' }) },
          });
          return;
        }
        if (toolName === 'resume_replies') {
          if (onResumeReplies) onResumeReplies();
          sendDataChannelMessage({
            type: 'conversation.item.create',
            item: { type: 'function_call_output', call_id: callId, output: JSON.stringify({ result: 'resumed' }) },
          });
          sendDataChannelMessage({ type: 'response.create' });
          return;
        }

        // Vocal injection: deterministic acknowledgement before delegation POST.
        // Fire-and-forget — never blocks tool execution if injection throws.
        if (toolName === 'delegate') {
          try {
            const _agentRaw = (() => {
              try { return JSON.parse(args || '{}').agent || 'sub-agent'; }
              catch (_) { return 'sub-agent'; }
            })();
            const _agentLabel = _agentRaw.replace(/[-_]/g, ' ');
            sendDataChannelMessage({
              type: 'conversation.item.create',
              item: {
                type:    'message',
                role:    'assistant',
                content: [{ type: 'input_text', text: `Delegating to ${_agentLabel} now…` }],
              },
            });
            sendDataChannelMessage({ type: 'response.create' });
          } catch (_injectErr) {
            console.warn('[useChatMessages] Vocal injection failed (non-fatal):', _injectErr);
          }
        }

        // Execute tool on the server
        // NOTE: server reads body.get("name"), not "tool_name"
        let output;
        try {
          const resp = await fetch('/voice/tools/execute', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: toolName,
              arguments: typeof args === 'string' ? JSON.parse(args) : args,
              call_id: callId,
              session_id: sessionId,
            }),
          });
          const data = await resp.json();
          output = JSON.stringify(data);
        } catch (err) {
          console.error('[useChatMessages] Tool execution failed:', err);
          output = JSON.stringify({ error: String(err) });
        }

        // Return the tool result to the model via function_call_output
        sendDataChannelMessage({
          type: 'conversation.item.create',
          item: { type: 'function_call_output', call_id: callId, output },
        });

        // Trigger the next assistant turn, or queue it until response.done
        if (!responseInProgressRef.current) {
          sendDataChannelMessage({ type: 'response.create' });
        } else {
          pendingAnnouncements.current.push({ type: 'response.create' });
        }
      }
    }, [sendDataChannelMessage, sessionId, addUserMessage, startAssistantMessage, setRip, onPauseReplies, onResumeReplies]);

    return { messages, responseInProgress, messageRefs, handleDataChannelEvent, clearMessages, loadHistoryMessages };
  }

  // -------------------------------------------------------------------------
  // useConnectionHealth({ manager, onProactiveReconnect })   Task 5.5
  // -------------------------------------------------------------------------

  function useConnectionHealth({ manager, onProactiveReconnect, reconnectionConfig = {} }) {
    const [status, setStatus] = useState(null);
    const [isMonitoring, setIsMonitoring] = useState(false);
    const onProactiveRef = useRef(onProactiveReconnect);
    const lastStaleWarnRef = useRef(null);
    const autoDelayTimerRef = useRef(null);

    const {
      strategy,                   // overrides manager.strategy when provided
      autoReconnectDelayMs = 3000,
      maxReconnectAttempts = 5,
    } = reconnectionConfig;

    // Keep ref current on every render so the interval callback sees latest fn
    useEffect(() => {
      onProactiveRef.current = onProactiveReconnect;
    });

    useEffect(() => {
      if (!manager) return;

      setIsMonitoring(true);

      const tick = () => {
        const s = manager.getStatus();
        setStatus(s);

        // Guard: max reconnect attempts
        if (manager.reconnectCount >= maxReconnectAttempts) return;

        const effectiveStrategy = strategy || manager.strategy;

        // Proactive: trigger reconnect before the 60-min session limit
        if (
          s.warnings.includes('session_limit') &&
          effectiveStrategy === 'proactive' &&
          onProactiveRef.current
        ) {
          onProactiveRef.current();
        }

        // Auto immediate: reconnect right away when disconnected
        if (
          s.healthStatus === 'disconnected' &&
          effectiveStrategy === 'auto_immediate' &&
          onProactiveRef.current
        ) {
          onProactiveRef.current();
        }

        // Auto delayed: reconnect after a short delay when disconnected
        if (
          s.healthStatus === 'disconnected' &&
          effectiveStrategy === 'auto_delayed' &&
          onProactiveRef.current &&
          !autoDelayTimerRef.current
        ) {
          autoDelayTimerRef.current = setTimeout(() => {
            autoDelayTimerRef.current = null;
            if (onProactiveRef.current) onProactiveRef.current();
          }, autoReconnectDelayMs);
        }

        // Rate-limit stale connection console warnings to once per 30s
        if (s.warnings.includes('stale')) {
          const now = Date.now();
          const timeSinceLastWarn = lastStaleWarnRef.current
            ? now - lastStaleWarnRef.current
            : Infinity;
          if (timeSinceLastWarn >= 30000) {
            lastStaleWarnRef.current = now;
            console.warn('[useConnectionHealth] Stale connection detected');
          }
        }
      };

      // Immediate snapshot, then every 5 s
      tick();
      const id = setInterval(tick, 5000);
      return () => {
        clearInterval(id);
        if (autoDelayTimerRef.current) {
          clearTimeout(autoDelayTimerRef.current);
          autoDelayTimerRef.current = null;
        }
        setIsMonitoring(false);
      };
    }, [manager, strategy, autoReconnectDelayMs, maxReconnectAttempts]);

    return { status, isMonitoring };
  }

  // -------------------------------------------------------------------------
  // ConnectionHealthPanel({ status, strategy, onStrategyChange })   Task 5.5
  // -------------------------------------------------------------------------

  /** Format seconds as "Xm Ys" */
  function fmtDuration(seconds) {
    if (seconds == null) return '—';
    const s = Math.floor(seconds);
    const m = Math.floor(s / 60);
    return `${m}m ${s % 60}s`;
  }

  // Map health status to a display color
  const HEALTH_STATUS_COLORS = {
    healthy:      '#22c55e',
    warning:      '#f59e0b',
    critical:     '#ef4444',
    disconnected: '#6b7280',
  };

  function ConnectionHealthPanel({ status, strategy, onStrategyChange }) {
    const [expanded, setExpanded] = useState(false);

    if (!status) return null;

    const { sessionAge, timeSinceEvent, reconnectCount, warnings, healthStatus } = status;
    const dotColor = HEALTH_STATUS_COLORS[healthStatus] || HEALTH_STATUS_COLORS.disconnected;

    return html`
      <div class="health-panel">
        <button
          class="health-panel-header"
          onClick=${() => setExpanded((e) => !e)}
          aria-expanded=${expanded}
        >
          <span class="health-panel-header-left">
            <span
              class="health-status-dot"
              style=${{ display: 'inline-block', width: '10px', height: '10px', borderRadius: '50%', background: dotColor, marginRight: '6px', flexShrink: 0 }}
              title=${healthStatus || 'unknown'}
            ></span>
            <span>🥪 Connection Health</span>
            ${warnings.length > 0 && html`
              <span class="health-badges">
                ${warnings.map((w) => html`<span key=${w} class=${'warning-badge ' + w}>${w.replace('_', ' ')}</span>`)}
              </span>
            `}
          </span>
          <span>${expanded ? '▲' : '▼'}</span>
        </button>

        ${expanded && html`
          <div class="health-panel-body">
            <div class="health-row">
              <span class="health-label">Status</span>
              <span class="health-value" style=${{ color: dotColor, fontWeight: 600 }}>${healthStatus || '—'}</span>
            </div>
            <div class="health-row">
              <span class="health-label">Session age</span>
              <span class="health-value">${fmtDuration(sessionAge)}</span>
            </div>
            <div class="health-row">
              <span class="health-label">Last event</span>
              <span class="health-value">${fmtDuration(timeSinceEvent)} ago</span>
            </div>
            <div class="health-row">
              <span class="health-label">Reconnects</span>
              <span class="health-value">${reconnectCount}</span>
            </div>
            <div class="health-strategy">
              <label for="health-strategy-select">Strategy</label>
              <select
                id="health-strategy-select"
                value=${strategy}
                onChange=${(e) => onStrategyChange && onStrategyChange(e.target.value)}
              >
                <option value="manual">Manual</option>
                <option value="auto_immediate">Auto immediate</option>
                <option value="auto_delayed">Auto delayed (3s)</option>
                <option value="proactive">Proactive (55min)</option>
              </select>
            </div>
          </div>
        `}
      </div>
    `;
  }

  // -------------------------------------------------------------------------
  // useMicrophoneControl({ sendDataChannelMessage })   Task 5.4
  // Tri-state model: micState is one of 'normal' | 'paused' | 'muted'
  // -------------------------------------------------------------------------

  function useMicrophoneControl({ sendDataChannelMessage }) {
    const [micState, setMicState] = useState('normal');
    // Ref synced via effect — lets async/stale callbacks read current state
    const micStateRef = useRef('normal');
    // Remembers what state we were in before muting so unmute can restore it
    const previousStateRef = useRef('normal');
    const streamRef = useRef(null);

    // Keep ref current on every render
    useEffect(() => {
      micStateRef.current = micState;
    }, [micState]);

    // Store the mic MediaStream reference so toggleMute can reach audio tracks
    const setMicStream = useCallback((stream) => {
      streamRef.current = stream;
    }, []);

    // Toggle mute:
    //   normal/paused → save previousState, disable audio track, set 'muted'
    //   muted         → enable audio track, restore to previousState (default 'normal')
    // Uses updater form of setState to avoid stale-closure on micState.
    const toggleMute = useCallback(() => {
      const stream = streamRef.current;
      if (!stream) return;
      setMicState((prev) => {
        if (prev === 'muted') {
          // Unmute: re-enable track, restore prior state
          stream.getAudioTracks().forEach((track) => { track.enabled = true; });
          return previousStateRef.current || 'normal';
        } else {
          // Mute: save current state, disable track
          previousStateRef.current = prev;
          stream.getAudioTracks().forEach((track) => { track.enabled = false; });
          return 'muted';
        }
      });
    }, []);

    // Pause: if currently muted, unmute mic first (re-enable audio track),
    // then send session.update with create_response: false and set state 'paused'.
    // Uses GA API nested path: session.audio.input.turn_detection (not beta flat path).
    const enterPauseReplies = useCallback(() => {
      const stream = streamRef.current;
      if (micStateRef.current === 'muted' && stream) {
        stream.getAudioTracks().forEach((track) => { track.enabled = true; });
      }
      sendDataChannelMessage({
        type: 'session.update',
        session: {
          type: 'realtime',
          audio: { input: { turn_detection: { type: 'server_vad', create_response: false } } },
        },
      });
      setMicState('paused');
    }, [sendDataChannelMessage]);

    // Resume: send session.update with create_response: true, set state 'normal'
    const exitPauseReplies = useCallback(() => {
      sendDataChannelMessage({
        type: 'session.update',
        session: {
          type: 'realtime',
          audio: { input: { turn_detection: { type: 'server_vad', create_response: true } } },
        },
      });
      setMicState('normal');
    }, [sendDataChannelMessage]);

    // One-shot response while paused — useful to get an answer without fully resuming
    const triggerResponse = useCallback(() => {
      sendDataChannelMessage({ type: 'response.create' });
    }, [sendDataChannelMessage]);

    // Derived booleans for backward compatibility
    const muted = micState === 'muted';
    const pauseReplies = micState === 'paused';

    return { micState, muted, pauseReplies, toggleMute, enterPauseReplies, exitPauseReplies, triggerResponse, setMicStream };
  }

  // -------------------------------------------------------------------------
  // useVoiceKeywords({ assistantName, onTriggerResponse, onPauseReplies,
  //                    onResumeReplies, onMute, onUnmute })   Task 5.4
  // -------------------------------------------------------------------------

  function useVoiceKeywords({
    assistantName,
    onTriggerResponse,
    onPauseReplies,
    onResumeReplies,
    onMute,
    onUnmute,
  }) {
    const lastFiredRef = useRef(0);
    const DEBOUNCE_MS = 2000;

    const checkTranscript = useCallback((transcript) => {
      const lower = transcript.toLowerCase();
      const wakeWord = 'hey ' + (assistantName || 'amplifier').toLowerCase();
      if (!lower.includes(wakeWord)) return;

      // Debounce: ignore rapid repeat triggers within DEBOUNCE_MS
      const now = Date.now();
      if (now - lastFiredRef.current < DEBOUNCE_MS) return;

      if (lower.includes('go ahead') || lower.includes('your turn')) {
        lastFiredRef.current = now;
        if (onTriggerResponse) onTriggerResponse();
      } else if (lower.includes('pause replies')) {
        lastFiredRef.current = now;
        if (onPauseReplies) onPauseReplies();
      } else if (lower.includes('resume')) {
        lastFiredRef.current = now;
        if (onResumeReplies) onResumeReplies();
      } else if (lower.includes('unmute')) {
        // 'unmute' must be checked before 'mute' to avoid false match
        lastFiredRef.current = now;
        if (onUnmute) onUnmute();
      } else if (lower.includes('mute')) {
        lastFiredRef.current = now;
        if (onMute) onMute();
      }
    }, [assistantName, onTriggerResponse, onPauseReplies, onResumeReplies, onMute, onUnmute]);

    return { checkTranscript };
  }

  // -------------------------------------------------------------------------
  // DelegationOverlay({ state })   delegation-feedback
  // Floating panel below the header. Visible only while delegation is active.
  // -------------------------------------------------------------------------

  function DelegationOverlay({ state }) {
    if (!state || !state.active) return null;

    return html`
      <div class="delegation-overlay">
        <div class="delegation-overlay-header">
          <div class="delegation-overlay-spinner"></div>
          <span>${state.agentName
            ? html`Delegating to <strong>${state.agentName}</strong>…`
            : 'Working…'}</span>
        </div>
        ${state.tools && state.tools.length > 0 && html`
          <div class="delegation-overlay-tools">
            ${state.tools.map((tool, i) => html`
              <div key=${i} class="delegation-overlay-tool">${tool}</div>
            `)}
          </div>
        `}
      </div>
    `;
  }

  // -------------------------------------------------------------------------
  // DelegationTranscriptEntry({ entry })   delegation-feedback
  // Permanent bubble in transcript. entry: { id, agentName, active, tools[], elapsed, error }
  // -------------------------------------------------------------------------

  function DelegationTranscriptEntry({ entry }) {
    const [expanded, setExpanded] = useState(false);

    if (!entry) return null;

    const { agentName, active, tools, elapsed, error } = entry;
    const toolCount = tools ? tools.length : 0;
    const agentLabel = agentName || 'sub-agent';
    const elapsedLabel = elapsed != null ? `${elapsed}s` : null;

    if (active) {
      return html`
        <div class=${'message-bubble delegation'}>
          <div class="bubble-label">↗ activity</div>
          <div class="bubble-text">
            <div class="delegation-summary">
              <span>${agentName
                ? html`Delegating to <strong>${agentName}</strong>`
                : 'Working'}</span>
              <div class="delegation-dots">
                <span></span><span></span><span></span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    const summaryParts = [
      agentName ? `Delegated to ${agentName}` : 'Completed',
      `${toolCount} ${toolCount === 1 ? 'tool' : 'tools'}`,
      elapsedLabel,
    ].filter(Boolean).join(' · ');

    return html`
      <div class=${'message-bubble delegation' + (error ? ' error' : '')}>
        <div class="bubble-label">↗ delegation</div>
        <div
          class="bubble-text"
          onClick=${() => toolCount > 0 && setExpanded((e) => !e)}
          title=${toolCount > 0 ? (expanded ? 'Click to collapse' : 'Click to expand tool list') : ''}
        >
          <div class="delegation-summary">
            <span>${error ? '⚠ ' : '✓ '}${summaryParts}</span>
            ${toolCount > 0 && html`<span style="color:#3b82f6;font-size:11px;">${expanded ? '▲' : '▼'}</span>`}
          </div>
          ${expanded && toolCount > 0 && html`
            <div class="delegation-tool-list">
              ${tools.map((tool, i) => html`
                <div key=${i} class="delegation-tool-item">${tool}</div>
              `)}
            </div>
          `}
        </div>
      </div>
    `;
  }

  // -------------------------------------------------------------------------
  // useAmplifierEvents({ onEvent, onDelegationStart, onDelegationEnd })
  // delegation-feedback: Extended to track delegation lifecycle.
  // Returns { delegationState } for the overlay component.
  // -------------------------------------------------------------------------

  const AMPLIFIER_EVENT_ICONS = {
    provider_request:          '🔼',
    provider_response:         '🔽',
    tool_call:                 '🔧',
    tool_pre:                  '🔧',
    tool_post:                 '✅',
    tool_result:               '🔧',
    tool_error:                '❌',
    session_fork:              '🔀',
    orchestrator_complete:     '🏁',
    cancel_requested:          '🛑',
    cancel_completed:          '✅',
    delegate_agent_completed:  '✓',
  };

  function useAmplifierEvents({ onEvent, onDelegationStart, onDelegationEnd }) {
    const onEventRef  = useRef(onEvent);
    const onStartRef  = useRef(onDelegationStart);
    const onEndRef    = useRef(onDelegationEnd);
    useEffect(() => { onEventRef.current = onEvent; });
    useEffect(() => { onStartRef.current = onDelegationStart; });
    useEffect(() => { onEndRef.current = onDelegationEnd; });

    const [delegationState, setDelegationState] = useState({
      active: false, agentName: null, startTime: null, tools: [],
    });

    const delegationToolsRef  = useRef([]);
    const delegationStartRef  = useRef(null);
    const delegationAgentRef  = useRef(null);

    useEffect(() => {
      const es = new EventSource('/voice/events');

      es.onmessage = (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch (_) { return; }
        if (!msg || msg.type === 'heartbeat') return;

        const icon = AMPLIFIER_EVENT_ICONS[msg.type] || '📨';
        console.log(
          `%c[Amplifier] ${icon} ${msg.type}`,
          'color:#818cf8;font-weight:bold;',
          msg,
        );

        // --- Activity lifecycle tracking ---
        // Tracks TWO kinds of activity:
        //   1. Child delegation: session_fork → tool_call(delegating_agent) → delegate_agent_completed
        //   2. Parent tool calls: tool_pre → tool_pre → ... → orchestrator_complete
        // Both drive the same overlay and transcript entry components.

        if (msg.type === 'session_fork') {
          // Child session spawned — start tracking with agent name
          const agentName = msg.agent || 'sub-agent';
          delegationToolsRef.current = [];
          delegationStartRef.current = Date.now();
          delegationAgentRef.current = agentName;
          setDelegationState({ active: true, agentName, startTime: Date.now(), tools: [] });
          if (onStartRef.current) onStartRef.current(msg);

        } else if (msg.type === 'tool_pre' || (msg.type === 'tool_call' && msg.delegating_agent)) {
          // Tool activity — either parent session (tool_pre) or child session (tool_call + delegating_agent)
          const toolName = msg.tool_name;
          if (toolName) {
            // If this is the first tool and no delegation is active yet, start the overlay
            if (!delegationStartRef.current) {
              delegationToolsRef.current = [];
              delegationStartRef.current = Date.now();
              delegationAgentRef.current = msg.delegating_agent || null;
              setDelegationState({ active: true, agentName: msg.delegating_agent || null, startTime: Date.now(), tools: [toolName] });
              delegationToolsRef.current = [toolName];
              if (onStartRef.current) onStartRef.current(msg);
            } else {
              delegationToolsRef.current = [...delegationToolsRef.current, toolName];
              setDelegationState((prev) => ({ ...prev, tools: [...delegationToolsRef.current] }));
            }
          }

        } else if (msg.type === 'delegate_agent_completed' || msg.type === 'orchestrator_complete') {
          // Activity finished — either child completed or parent session done
          if (delegationStartRef.current) {
            const startMs = delegationStartRef.current;
            const elapsed = startMs ? ((Date.now() - startMs) / 1000).toFixed(1) : '0.0';
            const snapshot = {
              agentName: delegationAgentRef.current || null,
              tools:     [...delegationToolsRef.current],
              elapsed,
              error:     msg.error || false,
            };
            setDelegationState({ active: false, agentName: null, startTime: null, tools: [] });
            delegationToolsRef.current = [];
            delegationStartRef.current = null;
            delegationAgentRef.current = null;
            if (onEndRef.current) onEndRef.current(snapshot);
          }
        }

        if (onEventRef.current) onEventRef.current(msg);
      };

      es.onerror = (err) => {
        console.warn('[useAmplifierEvents] SSE connection error:', err);
      };

      return () => { es.close(); };
    }, []);

    return { delegationState };
  }

  // -------------------------------------------------------------------------
  // SessionPicker({ onResume })   Task 5.6
  // Fetches /voice/sessions, shows the last 5 with a Resume button
  // (purple) for sessions that have not ended.
  // Returns null when there are no sessions.
  // -------------------------------------------------------------------------

  function SessionPicker({ onResume }) {
    const [sessions, setSessions] = useState(null);

    useEffect(() => {
      fetch('/voice/sessions')
        .then((r) => r.json())
        .then((data) => {
          const list = Array.isArray(data) ? data : (data.sessions || []);
          setSessions(list);
        })
        .catch(() => setSessions([]));
    }, []);

    // Render nothing until loaded, or if empty
    if (!sessions || sessions.length === 0) return null;

    // Most-recent first, capped at 5
    const last5 = sessions.slice().reverse().slice(0, 5);

    return html`
      <div class="session-picker">
        <div class="session-picker-title">Previous Sessions</div>
        ${last5.map((sess) => {
          const sid    = sess.session_id || sess.id;
          const title  = sess.title || sid;
          const status = sess.status || 'unknown';
          const date   = sess.created_at
            ? new Date(sess.created_at).toLocaleString()
            : '';
          // Show Resume for any session not explicitly ended/completed;
          // 'unknown' status is treated as resumable (API may not always set status)
          const canResume = status !== 'ended' && status !== 'completed';

          return html`
            <div key=${sid} class="session-item">
              <div class="session-info">
                <span class="session-title">${title}</span>
                <span class="session-status">${status}</span>
                ${date && html`<span class="session-date">${date}</span>`}
              </div>
              ${canResume && html`
                <button
                  class="btn btn-resume"
                  onClick=${() => onResume && onResume(sid)}
                >Resume</button>
              `}
            </div>
          `;
        })}
      </div>
    `;
  }

  // -------------------------------------------------------------------------
  // StopButton({ sessionId, runningTools, onStop })   Task 5.6
  // Single click  → graceful cancel (immediate:false)
  // Double click (<400 ms) → hard cancel  (immediate:true)
  // Label: 'Stop ({toolName})' while tool is running, 'Stopping...' during cancel.
  // -------------------------------------------------------------------------

  function StopButton({ sessionId, runningTools, onStop }) {
    const [cancelling, setCancelling] = useState(false);
    const lastClickRef = useRef(0);

    const toolName = (runningTools && runningTools.length > 0) ? runningTools[0] : null;

    const handleClick = useCallback(async () => {
      const now = Date.now();
      const isDoubleClick = (now - lastClickRef.current) < 400;
      lastClickRef.current = now;

      // Allow double-click escalation even if already cancelling
      if (cancelling && !isDoubleClick) return;

      const immediate = isDoubleClick;

      setCancelling(true);
      try {
        await fetch('/voice/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, immediate }),
        });
        if (onStop) onStop();
      } catch (err) {
        console.error('[StopButton] Cancel request failed:', err);
      } finally {
        setCancelling(false);
      }
    }, [cancelling, sessionId, onStop]);

    const label = cancelling
      ? 'Stopping...'
      : toolName
        ? `Stop (${toolName})`
        : 'Stop';

    return html`
      <button
        class=${'btn btn-stop' + (cancelling ? ' cancelling' : '')}
        onClick=${handleClick}
        disabled=${!sessionId}
        title="Click to stop gracefully · Double-click to stop immediately"
      >
        🛑 ${label}
      </button>
    `;
  }

  // -------------------------------------------------------------------------
  // MicrophoneControls({ micState, muted, pauseReplies, onToggleMute,
  //                      onPauseReplies, onResumeReplies,
  //                      onTriggerResponse })   Task 5.6
  // Tri-state aware: normal (green mic), paused (amber), muted (red).
  // Shows a one-shot "Respond" button only while in 'paused' state.
  // -------------------------------------------------------------------------

  function MicrophoneControls({ micState, muted, pauseReplies, onToggleMute, onPauseReplies, onResumeReplies, onTriggerResponse }) {
    return html`
      <div class="mic-controls">
        <button
          class=${'btn btn-mic' + (muted ? ' muted' : (micState === 'normal' ? ' normal' : ''))}
          onClick=${onToggleMute}
          title=${muted ? 'Unmute microphone' : 'Mute microphone'}
        >
          ${muted ? '🔇 Muted' : '🎙️ Mic'}
        </button>
        <button
          class=${'btn btn-pause' + (pauseReplies ? ' paused' : '')}
          onClick=${pauseReplies ? onResumeReplies : onPauseReplies}
          title=${pauseReplies ? 'Resume replies' : 'Pause replies'}
        >
          ${pauseReplies ? '▶️ Resume' : '⏸️ Pause'}
        </button>
        ${pauseReplies && html`
          <button
            class="btn btn-respond"
            onClick=${onTriggerResponse}
            title="Get one response without fully resuming"
          >
            💬 Respond
          </button>
        `}
      </div>
    `;
  }

  // -------------------------------------------------------------------------
  // VoiceApp root component
  // -------------------------------------------------------------------------

  function VoiceApp() {
    const [error, setError] = useState(null);
    const [isConnecting, setIsConnecting] = useState(false);
    const [sessionId, setSessionId] = useState(null);  // Task 5.3: session state
    const transcriptEndRef = useRef(null);
    const feedbackSlotRef = useRef(null);

    // Task 5.5: connection health manager (stable across renders)
    const healthManagerRef = useRef(null);
    if (!healthManagerRef.current) {
      healthManagerRef.current = new ConnectionHealthManager({ strategy: 'manual' });
    }
    const [healthStrategy, setHealthStrategy] = useState('manual');

    // Task 5.6: track tools currently running (for StopButton label)
    const [runningTools, setRunningTools] = useState([]);
    const runningToolsRef = useRef([]);   // shadow ref for sync mutation

    // delegation-feedback: permanent transcript record of each delegation
    const [delegationEntries, setDelegationEntries] = useState([]);

    // Task 5.4: fetch assistant name on mount (default: 'Amplifier')
    const [assistantName, setAssistantName] = useState('Amplifier');
    useEffect(() => {
      fetch('/voice/api/status')
        .then((r) => r.json())
        .then((data) => { if (data.assistant_name) setAssistantName(data.assistant_name); })
        .catch(() => { /* silent — keep default 'Amplifier' */ });
    }, []);

    // Ref so onProactiveReconnect (below) can call handleResume (defined after this hook call)
    const handleResumeRef = useRef(null);

    // Task 5.5: poll connection health every 5s
    const { status: healthStatus } = useConnectionHealth({
      manager: healthManagerRef.current,
      onProactiveReconnect: useCallback(() => {
        console.debug('[VoiceApp] Proactive reconnect triggered by session_limit warning');
        if (handleResumeRef.current && sessionId) {
          handleResumeRef.current(sessionId);
        }
      }, [sessionId]),
    });

    // Task 5.5: sync strategy state → manager whenever it changes
    useEffect(() => {
      healthManagerRef.current.strategy = healthStrategy;
    }, [healthStrategy]);

    // Stable message handler ref — breaks the circular hook dependency:
    // useWebRTC.onMessage → useChatMessages.handleDataChannelEvent → sendDataChannelMessage
    const msgHandlerRef = useRef(null);

    // Task 5.5 + 5.6: wrap stable handler to record health events AND track running tools
    const stableMsgHandler = useCallback((msg) => {
      healthManagerRef.current.recordEvent();

      // Record speech events (Task 5.5)
      if (
        msg.type === 'conversation.item.input_audio_transcription.completed' ||
        msg.type === 'response.audio_transcript.done'
      ) {
        healthManagerRef.current.recordSpeech();
      }

      // Task 5.6: track which tools are running for StopButton
      if (msg.type === 'response.output_item.added' && msg.item && msg.item.type === 'function_call') {
        const updated = [...runningToolsRef.current, msg.item.name];
        runningToolsRef.current = updated;
        setRunningTools(updated);
      }
      if (msg.type === 'response.done') {
        runningToolsRef.current = [];
        setRunningTools([]);
      }

      if (msgHandlerRef.current) msgHandlerRef.current(msg);
    }, []);

    const handleStateChange = useCallback((state) => {
      console.debug('[VoiceApp] RTC state changed:', state);  // Task 5.3
      // End session on unexpected disconnect (ICE failure, network drop, etc.)
      if (state === 'disconnected' && healthManagerRef.current) {
        const reason = healthManagerRef.current.analyzeDisconnectReason();
        healthManagerRef.current.endSession(reason);
      }
    }, []);

    const { rtcState, secureContextError, connect, disconnect, sendDataChannelMessage, streamRef } = useWebRTC({
      onMessage: stableMsgHandler,
      onStateChange: handleStateChange,
      onIceStateChange: useCallback((iceState) => {
        if (healthManagerRef.current) {
          healthManagerRef.current.recordConnectionState(iceState);
        }
      }, []),
    });

    // Task 5.4: microphone mute + pause-replies control (tri-state)
    const {
      micState,
      muted,
      pauseReplies,
      toggleMute,
      enterPauseReplies,
      exitPauseReplies,
      triggerResponse,
      setMicStream,
    } = useMicrophoneControl({ sendDataChannelMessage });

    // Task 5.4: keyword detection — wire actions to microphone/pause hooks
    const { checkTranscript } = useVoiceKeywords({
      assistantName,
      onTriggerResponse: useCallback(
        () => sendDataChannelMessage({ type: 'response.create' }),
        [sendDataChannelMessage],
      ),
      onPauseReplies: enterPauseReplies,
      onResumeReplies: exitPauseReplies,
      onMute: toggleMute,
      onUnmute: toggleMute,
    });

    const {
      messages,
      messageRefs,
      handleDataChannelEvent,
      clearMessages,
      loadHistoryMessages,
    } = useChatMessages({
      sendDataChannelMessage,
      sessionId,
      checkTranscript,
      onPauseReplies: enterPauseReplies,
      onResumeReplies: exitPauseReplies,
    });

    // Wire latest handler into stable ref on every render (ref mutation, no rerender)
    msgHandlerRef.current = handleDataChannelEvent;

    // Mount shared feedback widget into header slot (once)
    useEffect(() => {
      const slot = feedbackSlotRef.current;
      if (!slot || slot.childElementCount > 0) return;
      if (window.AmplifierFeedback) {
        window.AmplifierFeedback.init({
          mode: 'inline',
          container: slot,
          label: 'Feedback',
          context: { app: 'voice' },
        });
      }
    }, []);

    // delegation-feedback: SSE consumer with delegation lifecycle
    const { delegationState } = useAmplifierEvents({
      onEvent: useCallback((msg) => {
        console.debug('[VoiceApp] Amplifier event received:', msg.type);
      }, []),

      onDelegationStart: useCallback((msg) => {
        const entryId = `delegation-${Date.now()}`;
        setDelegationEntries((prev) => [
          ...prev,
          { id: entryId, agentName: msg.agent || 'sub-agent', active: true, tools: [], elapsed: null, error: false },
        ]);
      }, []),

      onDelegationEnd: useCallback((snapshot) => {
        setDelegationEntries((prev) =>
          prev.map((entry) =>
            entry.active
              ? { ...entry, active: false, tools: snapshot.tools, elapsed: snapshot.elapsed, error: snapshot.error }
              : entry
          )
        );
      }, []),
    });

    // Task 5.6: shadow ref so beforeunload can read latest messages without stale closure
    const transcriptRef = useRef([]);
    useEffect(() => {
      transcriptRef.current = messages;
    }, [messages]);

    // Keep sessionId in a ref so async callbacks always see the current value
    // without needing to capture it in useCallback deps (avoids stale closures).
    const sessionIdRef = useRef(null);
    useEffect(() => {
      sessionIdRef.current = sessionId;
    }, [sessionId]);

    // Track how many entries have already been synced to avoid sending duplicates
    // when both the periodic sync and sendBeacon are active.
    const syncedCountRef = useRef(0);

    // Sync unsynced transcript entries to the server. Stable ref — no deps needed
    // because it reads sessionId and entries through refs, not closed-over state.
    // Safe to call from intervals, event handlers, and async disconnect flows.
    const syncTranscript = useCallback(async () => {
      const sid = sessionIdRef.current;
      if (!sid) return;
      const allEntries = transcriptRef.current;
      const unsynced = allEntries.slice(syncedCountRef.current);
      if (unsynced.length === 0) return;
      try {
        const resp = await fetch(`/voice/sessions/${sid}/transcript`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ entries: unsynced }),
        });
        if (resp.ok) {
          syncedCountRef.current = allEntries.length;
        }
      } catch (err) {
        console.warn('[VoiceApp] Transcript sync failed:', err);
      }
    }, []);

    // Task 5.6: sendBeacon on page unload — last-resort flush of unsynced entries.
    // Only sends entries not already persisted by the periodic sync.
    useEffect(() => {
      if (!sessionId) return;

      const handleBeforeUnload = () => {
        const allEntries = transcriptRef.current;
        if (!allEntries || allEntries.length === 0) return;
        // Only send what the periodic sync hasn't already persisted
        const unsyncedEntries = allEntries.slice(syncedCountRef.current);
        if (unsyncedEntries.length === 0) return;
        navigator.sendBeacon(
          `/voice/sessions/${sessionId}/transcript`,
          JSON.stringify({ entries: unsyncedEntries }),
        );
      };

      window.addEventListener('beforeunload', handleBeforeUnload);
      return () => window.removeEventListener('beforeunload', handleBeforeUnload);
    }, [sessionId]);

    // Periodic transcript sync every 30 s while a session is active.
    // Ensures conversations are persisted even without a clean page close
    // (network drop, browser crash, or tab killed mid-session).
    useEffect(() => {
      if (!sessionId) return;
      const id = setInterval(() => { syncTranscript(); }, 30000);
      return () => clearInterval(id);
    }, [sessionId, syncTranscript]);

    // Scroll transcript to bottom when new messages arrive
    useEffect(() => {
      if (transcriptEndRef.current) {
        transcriptEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }
    }, [messages]);

    // Task 5.6: resume a previous session — POST /sessions/{id}/resume then start WebRTC
    const handleResume = useCallback(async (resumeSessionId) => {
      setError(null);
      setIsConnecting(true);
      try {
        const resp = await fetch(`/voice/sessions/${resumeSessionId}/resume`, { method: 'POST' });
        if (!resp.ok) throw new Error(`Resume failed: ${resp.status}`);
        const resumeData = await resp.json();
        setSessionId(resumeSessionId);
        console.debug('[VoiceApp] Session resumed:', resumeSessionId);

        // Populate message history from prior session transcript so the user
        // can see the previous conversation while the live session loads.
        const contextItems = resumeData.context_to_inject || [];
        loadHistoryMessages(contextItems);

        // Connect WebRTC and inject prior context into the Realtime API session
        // so the voice model has memory of the previous conversation.
        await connect(contextItems);
        setMicStream(streamRef.current);
        healthManagerRef.current.startSession();
      } catch (err) {
        console.error('[VoiceApp] Resume failed:', err);
        disconnect();
        setError(err.message || 'Failed to resume session.');
      } finally {
        setIsConnecting(false);
      }
    }, [connect, disconnect, setMicStream, streamRef, loadHistoryMessages]);

    // Keep ref current so proactive reconnect (defined above) can forward to handleResume
    handleResumeRef.current = handleResume;

    // handleConnect: POST /voice/sessions then initiate WebRTC
    const handleConnect = useCallback(async () => {
      setError(null);
      setIsConnecting(true);
      try {
        // Create Amplifier session on the server
        const sessResp = await fetch('/voice/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!sessResp.ok) {
          throw new Error(`Failed to create session: ${sessResp.status}`);
        }
        const sessData = await sessResp.json();
        setSessionId(sessData.session_id);
        console.debug('[VoiceApp] Session created:', sessData.session_id);

        // Now initiate WebRTC connection
        await connect();

        // Task 5.4: wire mic stream into useMicrophoneControl for mute support
        setMicStream(streamRef.current);

        // Task 5.5: start session health tracking
        healthManagerRef.current.startSession();
      } catch (err) {
        console.error('[VoiceApp] Connection failed:', err);
