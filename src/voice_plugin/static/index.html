        disconnect(); // ensure full cleanup on any partial failure
        setError(err.message || 'Connection failed. Please try again.');
      } finally {
        setIsConnecting(false);
      }
    }, [connect, disconnect, setMicStream, streamRef]);

    const handleDisconnect = useCallback(async () => {
      // Record user-initiated disconnect before tearing down
      if (healthManagerRef.current) {
        healthManagerRef.current.endSession('user_initiated');
      }
      // Sync any remaining transcript entries before tearing down the session
      // so the last few messages are persisted even on a clean disconnect.
      await syncTranscript();
      disconnect();
      clearMessages();
      syncedCountRef.current = 0;
      setSessionId(null);
      setError(null);
    }, [disconnect, clearMessages, syncTranscript]);

    // Derive display state
    const isIdle = rtcState === 'idle';
    const statusLabel = {
      idle: 'Disconnected',
      connecting: 'Connecting…',
      connected: 'Connected',
      disconnected: 'Disconnected',
    }[rtcState] || 'Disconnected';

    return html`
      <div id="app">
        <div class="app-header">
          <h1 class="wordmark wordmark-sm">amplifier voice</h1>
          <div style="display:flex;align-items:center;gap:8px;">
            ${muted && html`<span class="muted-badge">🎙️ Muted</span>`}
            <div class=${'status-badge ' + rtcState}>
              <div class="status-dot"></div>
              ${statusLabel}
            </div>
            <span ref=${feedbackSlotRef} style="font-size:13px;"></span>
          </div>
        </div>

        ${pauseReplies && html`
          <div class="pause-banner">
            <span>⏸</span>
            <span>Replies paused — say "Hey ${assistantName}, resume" to continue</span>
          </div>
        `}

        <${DelegationOverlay} state=${delegationState} />

        ${secureContextError && html`
          <div class="secure-context-banner">
            <h3>Voice requires a secure connection</h3>
            <p>
              Browsers block microphone access over plain HTTP. To fix this, try one of:
            </p>
            <ul>
              <li>Run with <code>--tls auto</code> to enable automatic HTTPS</li>
              <li>Access via a Tailscale hostname (HTTPS is automatic)</li>
              <li>Use <code>localhost</code> instead of a bare IP address</li>
            </ul>
          </div>
        `}

        ${error && html`
          <div class="error-banner">
            <span>⚠</span>
            <span>${error}</span>
          </div>
        `}

        ${(isIdle || rtcState === 'disconnected') && html`
          <${SessionPicker} onResume=${handleResume} />
        `}

        <div class="transcript-container">
          ${messages.length === 0
            ? html`<div class="transcript-empty">No messages yet. Start a voice chat to begin.</div>`
            : messages.map((msg, idx) => html`
                ${!msg.isHistory && idx > 0 && messages[idx - 1].isHistory && html`
                  <div class="history-divider">Prior session above — live session below</div>
                `}
                <div key=${msg.id} class=${'message-bubble ' + msg.role + (msg.isHistory ? ' history' : '')}>
                  <div class="bubble-label">${msg.role}</div>
                  <div
                    class="bubble-text"
                    ref=${(el) => {
                      if (el) {
                        messageRefs.current[msg.id] = el;
                      } else {
                        delete messageRefs.current[msg.id];
                      }
                    }}
                  >${msg.content}</div>
                </div>
              `)
          }
          ${delegationEntries.map((entry) => html`
            <${DelegationTranscriptEntry} key=${entry.id} entry=${entry} />
          `)
          }
          <div ref=${transcriptEndRef}></div>
        </div>

        <div class="controls">
          ${isIdle || rtcState === 'disconnected'
            ? html`
                <button
                  class="btn btn-start"
                  onClick=${handleConnect}
                  disabled=${isConnecting}
                >
                  ${isConnecting ? 'Connecting…' : 'Start Voice Chat'}
                </button>
              `
            : html`
                <button
                  class="btn btn-disconnect"
                  onClick=${handleDisconnect}
                  disabled=${rtcState === 'connecting'}
                >
                  Disconnect
                </button>
                <${StopButton}
                  sessionId=${sessionId}
                  runningTools=${runningTools}
                  onStop=${handleDisconnect}
                />
              `
          }
        </div>

        ${rtcState === 'connected' && html`
          <${MicrophoneControls}
            micState=${micState}
            muted=${muted}
            pauseReplies=${pauseReplies}
            onToggleMute=${toggleMute}
            onPauseReplies=${enterPauseReplies}
            onResumeReplies=${exitPauseReplies}
            onTriggerResponse=${triggerResponse}
          />
          <${ConnectionHealthPanel}
            status=${healthStatus}
            strategy=${healthStrategy}
            onStrategyChange=${setHealthStrategy}
          />
        `}
      </div>
    `;
  }

  // -------------------------------------------------------------------------
  // Mount app
  // -------------------------------------------------------------------------
  render(h(VoiceApp, null), document.getElementById('app'));

})();
</script>
</body>
</html>
